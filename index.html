<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRA 괴담 모음 - 익명 커뮤니티</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #1a1a1a;
            color: #ddd;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #ff6b6b;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.5em;
            color: #ff6b6b;
            margin-bottom: 5px;
            font-weight: 900;
        }

        .tagline {
            color: #999;
            font-size: 0.95em;
        }

        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .nav button {
            padding: 10px 15px;
            border: 2px solid #ff6b6b;
            background: transparent;
            color: #ddd;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            font-size: 0.95em;
        }

        .nav button:hover {
            background: #ff6b6b;
            color: #1a1a1a;
        }

        .nav button.active {
            background: #ff6b6b;
            color: #1a1a1a;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        .board-section, .sidebar {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #3a3a3a;
        }

        .sidebar {
            height: fit-content;
        }

        .write-btn {
            width: 100%;
            padding: 12px;
            background: #ff6b6b;
            color: #1a1a1a;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .write-btn:hover {
            background: #ff5252;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            border: 2px solid #ff6b6b;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: bold;
            color: #ff6b6b;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .close-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 1.5em;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-weight: 500;
        }

        select, textarea, input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            color: #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.95em;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        input[type="file"] {
            border: 2px dashed #3a3a3a;
        }

        #image-preview img {
            max-width: 100%;
            max-height: 300px;
            margin-top: 10px;
            border-radius: 4px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-submit {
            background: #ff6b6b;
            color: #1a1a1a;
        }

        .btn-submit:hover {
            background: #ff5252;
        }

        .btn-cancel {
            background: #3a3a3a;
            color: #ddd;
        }

        .post {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .post:hover {
            border-color: #ff6b6b;
            background: #222;
        }

        .category-badge {
            display: inline-block;
            padding: 4px 10px;
            background: #ff6b6b;
            color: #1a1a1a;
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.85em;
            margin-right: 10px;
        }

        .post-title {
            color: #fff;
            font-weight: bold;
            font-size: 1.1em;
        }

        .post-image {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 4px;
            margin: 10px 0;
        }

        .post-meta {
            color: #777;
            font-size: 0.85em;
            margin-top: 8px;
        }

        .post-preview {
            color: #aaa;
            font-size: 0.95em;
            margin-top: 8px;
        }

        .post-stats {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            color: #777;
            font-size: 0.85em;
        }

        .detail-view {
            display: none;
        }

        .detail-view.active {
            display: block;
        }

        .detail-post {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .detail-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #fff;
            margin: 10px 0;
        }

        .back-btn {
            background: none;
            border: none;
            color: #ff6b6b;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .detail-content {
            color: #ddd;
            line-height: 1.6;
            margin: 20px 0;
            white-space: pre-wrap;
        }

        .detail-actions {
            display: flex;
            gap: 15px;
            padding: 15px 0;
            border-top: 1px solid #3a3a3a;
            border-bottom: 1px solid #3a3a3a;
        }

        .action-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 0.9em;
        }

        .action-btn:hover {
            color: #ff6b6b;
        }

        .comments-section {
            margin-top: 20px;
        }

        .comment-form {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .comment-form textarea {
            margin-bottom: 10px;
        }

        .comment {
            background: #0a0a0a;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 10px;
            border-left: 3px solid #ff6b6b;
        }

        .comment-meta {
            color: #777;
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .comment-text {
            color: #ddd;
        }

        .delete-btn {
            background: none;
            border: 1px solid #555;
            color: #888;
            font-size: 0.8em;
            padding: 2px 8px;
            border-radius: 3px;
            cursor: pointer;
            margin-left: 10px;
        }

        .delete-btn:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .stats-box {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            border-left: 3px solid #ff6b6b;
        }

        .stats-box h3 {
            color: #ff6b6b;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .stat-item {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #fff;
            font-weight: bold;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👻 CRA 괴담 모음</h1>
            <p class="tagline">익명의 CRA들이 공유하는 현장 일화... (허구입니다)</p>
        </header>

        <div class="nav">
            <button class="cat-btn active" data-category="all">전체</button>
            <button class="cat-btn" data-category="PM">PM 괴담</button>
            <button class="cat-btn" data-category="CRC">CRC 괴담</button>
            <button class="cat-btn" data-category="PI">PI 괴담</button>
            <button class="cat-btn" data-category="PH">PH 괴담</button>
            <button class="cat-btn" data-category="IRB">IRB 괴담</button>
            <button class="cat-btn" data-category="기타">+@</button>
        </div>

        <div class="main-layout">
            <div class="board-section">
                <div id="board-view">
                    <div id="post-list"></div>
                </div>
                <div id="detail-view" class="detail-view">
                    <button class="back-btn" onclick="showBoardView()">← 목록으로</button>
                    <div id="detail-content"></div>
                </div>
            </div>

            <div class="sidebar">
                <button class="write-btn" onclick="openWriteModal()">✍️ 글 쓰기</button>
                
                <div class="stats-box">
                    <h3>📊 통계</h3>
                    <div class="stat-item">총 괴담: <span class="stat-value" id="total-posts">0</span></div>
                    <div class="stat-item">총 추천: <span class="stat-value" id="total-likes">0</span></div>
                    <div class="stat-item">총 댓글: <span class="stat-value" id="total-comments">0</span></div>
                </div>

                <div class="stats-box">
                    <h3>🏆 카테고리별</h3>
                    <div id="category-stats"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="write-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                ✍️ 괴담 작성
                <button class="close-btn" onclick="closeWriteModal()">✕</button>
            </div>
            <form id="write-form">
                <div class="form-group">
                    <label>카테고리</label>
                    <select id="category" required>
                        <option value="">선택하세요</option>
                        <option value="PM">PM 괴담</option>
                        <option value="CRC">CRC 괴담</option>
                        <option value="PI">PI 괴담</option>
                        <option value="PH">PH 괴담</option>
                        <option value="IRB">IRB 괴담</option>
                        <option value="기타">+@</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>제목</label>
                    <input type="text" id="title" required placeholder="제목을 입력하세요">
                </div>
                <div class="form-group">
                    <label>내용</label>
                    <textarea id="content" required placeholder="괴담을 작성하세요..."></textarea>
                </div>
                <div class="form-group">
                    <label>📸 캡처본 (선택)</label>
                    <input type="file" id="image" accept="image/*">
                    <div id="image-preview"></div>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-submit" onclick="submitPost()">등록</button>
                    <button type="button" class="btn btn-cancel" onclick="closeWriteModal()">취소</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

    <script>
        // Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyBcchNIHG0Uwig-sdXogh2WU2mP5o98R7E",
            authDomain: "cra-urban-legend.firebaseapp.com",
            databaseURL: "https://cra-urban-legend-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cra-urban-legend",
            storageBucket: "cra-urban-legend.firebasestorage.app",
            messagingSenderId: "265847137659",
            appId: "1:265847137659:web:720e4b9eea06d0271849de"
        };

        // Firebase 초기화
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 전역 변수
        let userId = localStorage.getItem('user-id') || ('user-' + Math.random().toString(36).substr(2, 9));
        localStorage.setItem('user-id', userId);

        // 익명 동물 닉네임 생성 (구글 문서 스타일)
        const ADJECTIVES = ['익명의', '수줍은', '용감한', '졸린', '바쁜', '심각한', '해맑은', '시크한', '분노한', '초조한', '여유로운', '지친', '열정적인', '냉철한', '엉뚱한', '재빠른', '느긋한', '집요한', '해탈한', '짧은'];
        const ANIMALS = ['악어', '캥거루', '수달', '카피바라', '펭귄', '북극곰', '치타', '나무늘보', '고슴도치', '알파카', '미어캣', '판다', '너구리', '오리너구리', '두더지', '사막여우', '홍학', '문어', '해달', '쿼카'];

        let nickname = localStorage.getItem('user-nickname');
        if (!nickname) {
            const adj = ADJECTIVES[Math.floor(Math.random() * ADJECTIVES.length)];
            const animal = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
            nickname = adj + ' ' + animal;
            localStorage.setItem('user-nickname', nickname);
        }

        let selectedImage = null;
        let currentFilter = 'all';
        let allPosts = [];

        // 초기화
        document.addEventListener('DOMContentLoaded', function() {
            loadPosts();
            setupRealtimeListener();
            setupImageUpload();
            setupCategoryButtons();
        });

        function setupImageUpload() {
            const imageInput = document.getElementById('image');
            imageInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    selectedImage = event.target.result;
                    document.getElementById('image-preview').innerHTML = `<img src="${selectedImage}" alt="미리보기">`;
                };
                reader.readAsDataURL(file);
            });
        }

        function setupCategoryButtons() {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.category;
                    renderBoard();
                });
            });
        }

        function loadPosts() {
            db.ref('posts').once('value', snapshot => {
                allPosts = [];
                snapshot.forEach(child => {
                    allPosts.push({ id: child.key, ...child.val() });
                });
                allPosts.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                renderBoard();
                updateStats();
            });
        }

        function setupRealtimeListener() {
            db.ref('posts').on('child_added', snapshot => {
                const post = { id: snapshot.key, ...snapshot.val() };
                if (!allPosts.find(p => p.id === post.id)) {
                    allPosts.unshift(post);
                    renderBoard();
                    updateStats();
                }
            });

            db.ref('posts').on('child_changed', snapshot => {
                const idx = allPosts.findIndex(p => p.id === snapshot.key);
                if (idx !== -1) {
                    allPosts[idx] = { id: snapshot.key, ...snapshot.val() };
                    renderBoard();
                    updateStats();
                }
            });
        }

        function renderBoard() {
            const postList = document.getElementById('post-list');
            const filtered = currentFilter === 'all' 
                ? allPosts 
                : allPosts.filter(p => p.category === currentFilter);

            if (filtered.length === 0) {
                postList.innerHTML = '<div class="empty-state"><div style="font-size: 2em; margin-bottom: 10px;">📭</div><p>아직 괴담이 없어요.</p></div>';
                return;
            }

            postList.innerHTML = filtered.map(p => `
                <div class="post" onclick="showDetailView('${p.id}')">
                    <span class="category-badge">${p.category}</span>
                    <div class="post-title">${escapeHtml(p.title)}</div>
                    ${p.image ? `<img src="${p.image}" class="post-image" alt="첨부">` : ''}
                    <div class="post-preview">${escapeHtml(p.content.substring(0, 100))}...</div>
                    <div class="post-meta">${escapeHtml(p.nickname || '익명')} • ${p.created_at}</div>
                    <div class="post-stats">
                        <span>👍 ${p.likes || 0}</span>
                        <span>💬 ${Object.keys(p.comments || {}).length}</span>
                    </div>
                </div>
            `).join('');
        }

        function showDetailView(postId) {
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;

            const commentsHtml = Object.entries(post.comments || {})
                .map(([cid, c]) => `
                    <div class="comment">
                        <div class="comment-meta">
                            ${escapeHtml(c.nickname || '익명')} • ${c.date}
                            ${c.user_id === userId ? `<button class="delete-btn" onclick="deleteComment('${post.id}', '${cid}')">🗑️ 삭제</button>` : ''}
                        </div>
                        <div class="comment-text">${escapeHtml(c.text)}</div>
                    </div>
                `).join('');

            document.getElementById('detail-content').innerHTML = `
                <div class="detail-post">
                    <span class="category-badge">${post.category}</span>
                    ${post.user_id === userId ? `<button class="delete-btn" style="float: right;" onclick="deletePost('${post.id}')">🗑️ 글 삭제</button>` : ''}
                    <div class="detail-title">${escapeHtml(post.title)}</div>
                    <div class="post-meta">${escapeHtml(post.nickname || '익명')} • ${post.created_at}</div>
                    ${post.image ? `<img src="${post.image}" style="width: 100%; max-height: 500px; margin: 15px 0; border-radius: 4px;">` : ''}
                    <div class="detail-content">${escapeHtml(post.content)}</div>
                    <div class="detail-actions">
                        <button class="action-btn" onclick="toggleLike('${post.id}')">👍 ${post.likes || 0}</button>
                        <button class="action-btn">💬 ${Object.keys(post.comments || {}).length}</button>
                    </div>
                    <div class="comments-section">
                        <div class="comment-form">
                            <textarea id="comment-text-${post.id}" placeholder="댓글을 작성하세요... (${escapeHtml(nickname)}(으)로 등록됨)"></textarea>
                            <button class="btn btn-submit" onclick="addComment('${post.id}')">댓글 등록</button>
                        </div>
                        <div>${commentsHtml}</div>
                    </div>
                </div>
            `;

            document.getElementById('board-view').style.display = 'none';
            document.getElementById('detail-view').classList.add('active');
        }

        function deletePost(postId) {
            if (!confirm('정말 이 글을 삭제할까요? 되돌릴 수 없어요!')) return;
            db.ref(`posts/${postId}`).remove().then(() => {
                allPosts = allPosts.filter(p => p.id !== postId);
                showBoardView();
                renderBoard();
                updateStats();
            });
        }

        function deleteComment(postId, commentId) {
            if (!confirm('이 댓글을 삭제할까요?')) return;
            db.ref(`posts/${postId}/comments/${commentId}`).remove().then(() => {
                loadPosts();
                setTimeout(() => showDetailView(postId), 300);
            });
        }

        function showBoardView() {
            document.getElementById('board-view').style.display = 'block';
            document.getElementById('detail-view').classList.remove('active');
        }

        function toggleLike(postId) {
            const post = allPosts.find(p => p.id === postId);
            db.ref(`posts/${postId}`).update({ likes: (post.likes || 0) + 1 });
        }

        function addComment(postId) {
            const text = document.getElementById(`comment-text-${postId}`).value.trim();
            if (!text) return;

            const cid = Date.now().toString();
            db.ref(`posts/${postId}/comments/${cid}`).set({
                text,
                user_id: userId,
                nickname: nickname,
                date: new Date().toLocaleDateString('ko-KR')
            }).then(() => {
                loadPosts();
                setTimeout(() => showDetailView(postId), 300);
            });
        }

        function submitPost() {
            const category = document.getElementById('category').value;
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;

            if (!category || !title || !content) {
                alert('모든 필드를 입력하세요');
                return;
            }

            const postId = Date.now().toString();
            db.ref(`posts/${postId}`).set({
                category,
                title,
                content,
                image: selectedImage || null,
                likes: 0,
                created_at: new Date().toLocaleDateString('ko-KR'),
                user_id: userId,
                nickname: nickname,
                comments: {}
            }).then(() => {
                closeWriteModal();
                selectedImage = null;
                loadPosts();
            });
        }

        function openWriteModal() {
            document.getElementById('write-modal').classList.add('active');
        }

        function closeWriteModal() {
            document.getElementById('write-modal').classList.remove('active');
            document.getElementById('write-form').reset();
            document.getElementById('image-preview').innerHTML = '';
            selectedImage = null;
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function updateStats() {
            document.getElementById('total-posts').textContent = allPosts.length;
            document.getElementById('total-likes').textContent = allPosts.reduce((s, p) => s + (p.likes || 0), 0);
            document.getElementById('total-comments').textContent = allPosts.reduce((s, p) => s + Object.keys(p.comments || {}).length, 0);

            const cats = ['PM', 'CRC', 'PI', 'PH', 'IRB', '기타'];
            const stats = cats.map(c => ({
                name: c === '기타' ? '+@' : c,
                count: allPosts.filter(p => p.category === c).length
            })).sort((a, b) => b.count - a.count);

            document.getElementById('category-stats').innerHTML = stats.map(s => `
                <div class="stat-item">${s.name}: <span class="stat-value">${s.count}</span></div>
            `).join('');
        }
    </script>
</body>
</html>
