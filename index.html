<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="👻 임상괴담.zip">
    <meta property="og:description" content="임상시험 현장의 익명 괴담 저장소. PM, CRC, PI, IRB... 압축 해제 주의 (허구입니다)">
    <meta property="og:type" content="website">
    <meta name="description" content="임상시험 현장의 익명 괴담 저장소. 압축 해제 주의.">
    <title>임상괴담.zip - 익명 커뮤니티</title>
    <style>
        /* ===== 🔥 모닥불 테마 (기본) ===== */
        :root {
            --bg: #211d18;
            --card: #2b2620;
            --deep: #171310;
            --border: #403829;
            --hover: #322c23;
            --text: #e8e2d9;
            --accent: #ffa94d;
            --accent-hover: #ff922b;
            --accent-soft: #3a2d1c;
            --hot: #ff7043;
            --vote: #4a69bd;
            --notice-bg: #332a1a;
            --notice-text: #ffcf87;
        }

        /* ===== 🩸 핏빛 테마 ===== */
        body[data-theme='blood'] {
            --bg: #1a1a1a;
            --card: #2a2a2a;
            --deep: #0a0a0a;
            --border: #3a3a3a;
            --hover: #222222;
            --text: #dddddd;
            --accent: #ff6b6b;
            --accent-hover: #ff5252;
            --accent-soft: #331a1a;
            --hot: #ffa502;
        }

        /* ===== 🔮 미스터리 테마 ===== */
        body[data-theme='mystery'] {
            --bg: #17151f;
            --card: #221f2e;
            --deep: #100e17;
            --border: #363048;
            --hover: #282438;
            --text: #ddd8e8;
            --accent: #b197fc;
            --accent-hover: #9775fa;
            --accent-soft: #2a2340;
            --hot: #f783ac;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        .theme-bar { display: flex; gap: 6px; justify-content: center; margin-top: 12px; }

        .theme-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: #999;
            padding: 4px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .theme-btn:hover { border-color: var(--accent); color: var(--accent); }
        .theme-btn.active { border-color: var(--accent); color: var(--accent); font-weight: bold; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid var(--accent);
            padding-bottom: 20px;
        }

        h1 { font-size: 2.5em; color: var(--accent); margin-bottom: 5px; font-weight: 900; }
        .tagline { color: #999; font-size: 0.95em; }

        .nav { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }

        .nav button {
            padding: 10px 15px;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            font-size: 0.95em;
        }

        .nav button:hover, .nav button.active { background: var(--accent); color: var(--bg); }

        .nav button.hot-btn { border-color: var(--hot); }
        .nav button.hot-btn:hover, .nav button.hot-btn.active { background: var(--hot); color: var(--bg); }

        .sort-bar { display: flex; gap: 8px; margin-bottom: 20px; }

        .sort-bar button {
            padding: 5px 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: #999;
            cursor: pointer;
            border-radius: 12px;
            font-size: 0.85em;
        }

        .sort-bar button.active { border-color: var(--accent); color: var(--accent); font-weight: bold; }

        .main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }

        .board-section, .sidebar {
            background: var(--card);
            border-radius: 8px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .sidebar { height: fit-content; }

        .write-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .write-btn:hover { background: var(--accent-hover); }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--card);
            border-radius: 8px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            border: 2px solid var(--accent);
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .close-btn { background: none; border: none; color: #999; font-size: 1.5em; cursor: pointer; }

        .notice-box {
            background: var(--notice-bg);
            border: 1px solid var(--hot);
            border-radius: 4px;
            padding: 12px;
            margin-bottom: 15px;
            font-size: 0.85em;
            color: var(--notice-text);
            line-height: 1.5;
        }

        .form-group { margin-bottom: 15px; }

        label { display: block; margin-bottom: 5px; color: #aaa; font-weight: 500; }

        select, textarea, input[type="text"], input[type="password"], input[type="file"] {
            width: 100%;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.95em;
        }

        textarea { resize: vertical; min-height: 120px; }
        input[type="file"] { border: 2px dashed var(--border); }

        #image-preview img { max-width: 100%; max-height: 300px; margin-top: 10px; border-radius: 4px; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-submit { background: var(--accent); color: var(--bg); }
        .btn-submit:hover { background: var(--accent-hover); }
        .btn-cancel { background: var(--border); color: var(--text); }

        .post {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .post:hover { border-color: var(--accent); background: var(--hover); }

        .post.blinded {
            cursor: default;
            color: #666;
            text-align: center;
            padding: 12px;
            font-size: 0.9em;
        }

        .post.blinded:hover { border-color: var(--border); background: var(--bg); }

        .category-badge {
            display: inline-block;
            padding: 4px 10px;
            background: var(--accent);
            color: var(--bg);
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.85em;
            margin-right: 6px;
        }

        .hot-badge {
            display: inline-block;
            padding: 4px 8px;
            background: var(--hot);
            color: var(--bg);
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.8em;
        }

        .post-title { color: #fff; font-weight: bold; font-size: 1.1em; margin-top: 8px; }

        .post-image {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 4px;
            margin: 10px 0;
        }

        .post-meta { color: #777; font-size: 0.85em; margin-top: 8px; }
        .post-preview { color: #aaa; font-size: 0.95em; margin-top: 8px; }

        .post-stats { display: flex; gap: 15px; margin-top: 10px; color: #777; font-size: 0.85em; }

        .detail-view { display: none; }
        .detail-view.active { display: block; }

        .detail-post {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .detail-title { font-size: 1.5em; font-weight: bold; color: #fff; margin: 10px 0; }

        .back-btn {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .detail-content {
            color: var(--text);
            line-height: 1.6;
            margin: 20px 0;
            white-space: pre-wrap;
        }

        .detail-actions {
            display: flex;
            gap: 15px;
            padding: 15px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .action-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 0.9em;
        }

        .action-btn:hover { color: var(--accent); }
        .action-btn.liked { color: var(--accent); font-weight: bold; }

        .report-btn { margin-left: auto; color: #666; }
        .report-btn:hover { color: var(--hot); }

        .comments-section { margin-top: 20px; }

        .comment-form {
            background: var(--deep);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .comment-form textarea { margin-bottom: 10px; min-height: 70px; }

        .comment {
            background: var(--deep);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 10px;
            border-left: 3px solid var(--accent);
        }

        .comment-meta { color: #777; font-size: 0.85em; margin-bottom: 5px; }
        .comment-text { color: var(--text); }

        .delete-btn {
            background: none;
            border: 1px solid #555;
            color: #888;
            font-size: 0.8em;
            padding: 2px 8px;
            border-radius: 3px;
            cursor: pointer;
            margin-left: 10px;
        }

        .delete-btn:hover { border-color: var(--accent); color: var(--accent); }

        .reaction-bar { display: flex; gap: 8px; flex-wrap: wrap; margin: 15px 0; }

        .reaction-btn {
            background: var(--deep);
            border: 1px solid var(--border);
            color: #ccc;
            padding: 6px 12px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .reaction-btn:hover { border-color: var(--accent); }

        .reaction-btn.reacted {
            border-color: var(--accent);
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: bold;
        }

        .vote-box {
            background: var(--deep);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            margin: 15px 0;
        }

        .vote-option { margin-bottom: 12px; cursor: pointer; }

        .vote-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
            font-size: 0.95em;
            color: var(--text);
        }

        .vote-bar-bg {
            background: var(--card);
            border-radius: 4px;
            height: 22px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .vote-bar-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }

        .vote-option.voted .vote-bar-fill { background: var(--hot); }

        .vote-badge {
            display: inline-block;
            padding: 4px 8px;
            background: var(--vote);
            color: #fff;
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.8em;
            margin-left: 6px;
        }

        .stats-box {
            background: var(--bg);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            border-left: 3px solid var(--accent);
        }

        .stats-box h3 { color: var(--accent); font-size: 0.9em; margin-bottom: 8px; }
        .stat-item { color: #aaa; font-size: 0.9em; margin-bottom: 5px; }
        .stat-value { color: #fff; font-weight: bold; }

        .my-nickname {
            background: var(--bg);
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            border-left: 3px solid var(--hot);
            font-size: 0.9em;
            color: #aaa;
        }

        .empty-state { text-align: center; padding: 40px 20px; color: #666; }

        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; }
            h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👻 임상괴담.zip</h1>
            <p class="tagline">임상시험 현장의 익명 실화(?) 모음... 압축 해제 주의 (허구입니다)</p>
            <div class="theme-bar">
                <button class="theme-btn" data-theme="campfire" onclick="setTheme('campfire')">🔥 모닥불</button>
                <button class="theme-btn" data-theme="blood" onclick="setTheme('blood')">🩸 핏빛</button>
                <button class="theme-btn" data-theme="mystery" onclick="setTheme('mystery')">🔮 미스터리</button>
            </div>
        </header>

        <div class="nav">
            <button class="cat-btn active" data-category="all">전체</button>
            <button class="cat-btn hot-btn" data-category="hot">🔥 HOT</button>
            <button class="cat-btn" data-category="PM">PM 괴담</button>
            <button class="cat-btn" data-category="CRC">CRC 괴담</button>
            <button class="cat-btn" data-category="PI">PI 괴담</button>
            <button class="cat-btn" data-category="PH">PH 괴담</button>
            <button class="cat-btn" data-category="IRB">IRB 괴담</button>
            <button class="cat-btn" data-category="기타">+@</button>
        </div>

        <div class="sort-bar">
            <button class="sort-btn active" data-sort="latest">최신순</button>
            <button class="sort-btn" data-sort="likes">추천순</button>
            <button class="sort-btn" data-sort="views">조회순</button>
        </div>

        <div class="main-layout">
            <div class="board-section">
                <div id="board-view">
                    <div id="post-list"></div>
                </div>
                <div id="detail-view" class="detail-view">
                    <button class="back-btn" onclick="showBoardViewAndClearHash()">← 목록으로</button>
                    <div id="detail-content"></div>
                </div>
            </div>

            <div class="sidebar">
                <button class="write-btn" onclick="openWriteModal()">✍️ 글 쓰기</button>
                <button class="write-btn" style="background: var(--vote); color: #fff;" onclick="randomPost()">🎲 랜덤 괴담 뽑기</button>

                <div class="my-nickname">
                    🎭 내 닉네임: <strong id="my-nickname-display" style="color: var(--hot);"></strong>
                </div>

                <div class="stats-box">
                    <h3>📊 통계</h3>
                    <div class="stat-item">총 괴담: <span class="stat-value" id="total-posts">0</span></div>
                    <div class="stat-item">🔥 HOT 괴담: <span class="stat-value" id="total-hot">0</span></div>
                    <div class="stat-item">총 추천: <span class="stat-value" id="total-likes">0</span></div>
                    <div class="stat-item">총 댓글: <span class="stat-value" id="total-comments">0</span></div>
                </div>

                <div class="stats-box">
                    <h3>👑 명예의 전당 (역대 추천 TOP 3)</h3>
                    <div id="hall-of-fame"></div>
                </div>

                <div class="stats-box">
                    <h3>🏆 카테고리별</h3>
                    <div id="category-stats"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="write-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                ✍️ 괴담 작성
                <button class="close-btn" onclick="closeWriteModal()">✕</button>
            </div>
            <div class="notice-box">
                ⚠️ <strong>작성 전 꼭 확인!</strong><br>
                병원명, 실명, 스터디명 등 <strong>특정 가능한 정보는 이니셜 처리</strong>해주세요.<br>
                (예: "S병원 K교수", "국내 모 제약사")<br>
                허위사실 및 명예훼손성 글은 블라인드/삭제될 수 있습니다.
            </div>
            <form id="write-form">
                <div class="form-group">
                    <label>카테고리</label>
                    <select id="category" required>
                        <option value="">선택하세요</option>
                        <option value="PM">PM 괴담</option>
                        <option value="CRC">CRC 괴담</option>
                        <option value="PI">PI 괴담</option>
                        <option value="PH">PH 괴담</option>
                        <option value="IRB">IRB 괴담</option>
                        <option value="기타">+@</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>제목</label>
                    <input type="text" id="title" required placeholder="제목을 입력하세요">
                </div>
                <div class="form-group">
                    <label>내용</label>
                    <textarea id="content" required placeholder="괴담을 작성하세요..."></textarea>
                </div>
                <div class="form-group">
                    <label style="cursor: pointer;"><input type="checkbox" id="vote-toggle" style="width: auto; margin-right: 6px;" onchange="toggleVoteInputs()"> ⚖️ 밸런스 게임 투표 붙이기</label>
                    <div id="vote-inputs" style="display: none; margin-top: 8px;">
                        <input type="text" id="vote-a" placeholder="선택지 A (예: 금요일 6시 PM의 급한 요청)" style="margin-bottom: 8px;">
                        <input type="text" id="vote-b" placeholder="선택지 B (예: 월요일 아침 CRC 잠수)">
                    </div>
                </div>
                <div class="form-group">
                    <label>🔑 글 비밀번호 (선택)</label>
                    <input type="password" id="post-password" maxlength="10" placeholder="입력하면 다른 기기에서도 이 글을 삭제할 수 있어요">
                </div>
                <div class="form-group">
                    <label>📸 캡처본 (선택)</label>
                    <input type="file" id="image" accept="image/*">
                    <div id="image-preview"></div>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn btn-submit" onclick="submitPost()">등록</button>
                    <button type="button" class="btn btn-cancel" onclick="closeWriteModal()">취소</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

    <script>
        // ===== Firebase 설정 =====
        const firebaseConfig = {
            apiKey: "AIzaSyBcchNIHG0Uwig-sdXogh2WU2mP5o98R7E",
            authDomain: "cra-urban-legend.firebaseapp.com",
            databaseURL: "https://cra-urban-legend-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cra-urban-legend",
            storageBucket: "cra-urban-legend.firebasestorage.app",
            messagingSenderId: "265847137659",
            appId: "1:265847137659:web:720e4b9eea06d0271849de"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ===== 사용자 식별 (익명 유지) =====
        let userId = localStorage.getItem('user-id') || ('user-' + Math.random().toString(36).substr(2, 9));
        localStorage.setItem('user-id', userId);

        // ===== 익명 동물 닉네임 =====
        const ADJECTIVES = ['익명의', '수줍은', '용감한', '졸린', '바쁜', '심각한', '해맑은', '시크한', '분노한', '초조한', '여유로운', '지친', '열정적인', '냉철한', '엉뚱한', '재빠른', '느긋한', '집요한', '해탈한', '짧은'];
        const ANIMALS = ['악어', '캥거루', '수달', '카피바라', '펭귄', '북극곰', '치타', '나무늘보', '고슴도치', '알파카', '미어캣', '판다', '너구리', '오리너구리', '두더지', '사막여우', '홍학', '문어', '해달', '쿼카'];

        let nickname = localStorage.getItem('user-nickname');
        if (!nickname) {
            nickname = ADJECTIVES[Math.floor(Math.random() * ADJECTIVES.length)] + ' ' + ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
            localStorage.setItem('user-nickname', nickname);
        }

        // ===== 상수 & 상태 =====
        const HOT_THRESHOLD = 5;      // 추천 5개 이상 = HOT
        const BLIND_THRESHOLD = 3;    // 신고 3회 = 블라인드

        let selectedImage = null;
        let currentFilter = 'all';
        let currentSort = 'latest';
        let allPosts = [];

        // ===== 비밀번호 해시 (평문 저장 방지) =====
        async function hashPassword(pw) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw + '::cra-salt'));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // ===== 헬퍼 =====
        const REACTIONS = [
            { key: 'scream', emoji: '😱', label: '소름' },
            { key: 'lol', emoji: '😂', label: '웃김' },
            { key: 'angry', emoji: '😤', label: '빡침' },
            { key: 'skull', emoji: '💀', label: '실화냐' },
            { key: 'salute', emoji: '🫡', label: '존버' }
        ];

        function reactionCount(p, key) { return Object.keys((p.reactions && p.reactions[key]) || {}).length; }
        function reactionSummary(p) {
            return REACTIONS.filter(r => reactionCount(p, r.key) > 0)
                .map(r => `<span>${r.emoji} ${reactionCount(p, r.key)}</span>`).join('');
        }

        function likeCount(p) { return Object.keys(p.likedBy || {}).length + (p.likes_legacy || 0); }
        function reportCount(p) { return Object.keys(p.reports || {}).length; }
        function isBlinded(p) { return reportCount(p) >= BLIND_THRESHOLD; }
        function isHot(p) { return likeCount(p) >= HOT_THRESHOLD; }
        function getTs(p) { return p.created_ts || parseInt(p.id) || 0; }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        // ===== 테마 시스템 =====
        function setTheme(t) {
            document.body.dataset.theme = t;
            localStorage.setItem('site-theme', t);
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === t));
        }

        // ===== 초기화 =====
        document.addEventListener('DOMContentLoaded', function() {
            setTheme(localStorage.getItem('site-theme') || 'campfire');
            document.getElementById('my-nickname-display').textContent = nickname;
            loadPosts();
            setupRealtimeListener();
            setupImageUpload();
            setupFilterButtons();
        });

        function setupImageUpload() {
            document.getElementById('image').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(event) {
                    selectedImage = event.target.result;
                    document.getElementById('image-preview').innerHTML = `<img src="${selectedImage}" alt="미리보기">`;
                };
                reader.readAsDataURL(file);
            });
        }

        function setupFilterButtons() {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.category;
                    showBoardView();
                    renderBoard();
                });
            });

            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentSort = this.dataset.sort;
                    renderBoard();
                });
            });
        }

        // ===== 데이터 로드 =====
        function loadPosts() {
            db.ref('posts').once('value', snapshot => {
                allPosts = [];
                snapshot.forEach(child => {
                    allPosts.push({ id: child.key, ...child.val() });
                });
                renderBoard();
                updateStats();

                // 공유 링크(#post=xxx)로 들어온 경우 해당 글 바로 열기
                if (location.hash.startsWith('#post=')) {
                    const targetId = location.hash.replace('#post=', '');
                    if (allPosts.find(p => p.id === targetId)) {
                        openPost(targetId);
                    }
                }
            });
        }

        function setupRealtimeListener() {
            db.ref('posts').on('child_added', snapshot => {
                const post = { id: snapshot.key, ...snapshot.val() };
                if (!allPosts.find(p => p.id === post.id)) {
                    allPosts.push(post);
                    renderBoard();
                    updateStats();
                }
            });

            db.ref('posts').on('child_changed', snapshot => {
                const idx = allPosts.findIndex(p => p.id === snapshot.key);
                if (idx !== -1) {
                    allPosts[idx] = { id: snapshot.key, ...snapshot.val() };
                    renderBoard();
                    updateStats();
                }
            });

            db.ref('posts').on('child_removed', snapshot => {
                allPosts = allPosts.filter(p => p.id !== snapshot.key);
                renderBoard();
                updateStats();
            });
        }

        // ===== 렌더링 =====
        function renderBoard() {
            const postList = document.getElementById('post-list');

            let filtered;
            if (currentFilter === 'all') {
                filtered = [...allPosts];
            } else if (currentFilter === 'hot') {
                filtered = allPosts.filter(p => isHot(p) && !isBlinded(p));
            } else {
                filtered = allPosts.filter(p => p.category === currentFilter);
            }

            // 정렬
            if (currentSort === 'latest') {
                filtered.sort((a, b) => getTs(b) - getTs(a));
            } else if (currentSort === 'likes') {
                filtered.sort((a, b) => likeCount(b) - likeCount(a));
            } else if (currentSort === 'views') {
                filtered.sort((a, b) => (b.views || 0) - (a.views || 0));
            }

            if (filtered.length === 0) {
                postList.innerHTML = '<div class="empty-state"><div style="font-size: 2em; margin-bottom: 10px;">📭</div><p>아직 괴담이 없어요.</p></div>';
                return;
            }

            postList.innerHTML = filtered.map(p => {
                if (isBlinded(p)) {
                    return `<div class="post blinded">🚫 신고 누적으로 블라인드 처리된 글입니다</div>`;
                }
                return `
                <div class="post" onclick="openPost('${p.id}')">
                    <span class="category-badge">${p.category}</span>${isHot(p) ? '<span class="hot-badge">🔥 HOT</span>' : ''}${p.vote ? '<span class="vote-badge">⚖️ 투표</span>' : ''}
                    <div class="post-title">${escapeHtml(p.title)}</div>
                    ${p.image ? `<img src="${p.image}" class="post-image" alt="첨부">` : ''}
                    <div class="post-preview">${escapeHtml(p.content.substring(0, 100))}...</div>
                    <div class="post-meta">${escapeHtml(p.nickname || '익명')} • ${p.created_at}</div>
                    <div class="post-stats">
                        <span>👍 ${likeCount(p)}</span>
                        <span>💬 ${Object.keys(p.comments || {}).length}</span>
                        <span>👁️ ${p.views || 0}</span>
                        ${reactionSummary(p)}
                    </div>
                </div>`;
            }).join('');
        }

        // ===== 상세보기 (조회수 증가 포함) =====
        function openPost(postId) {
            db.ref(`posts/${postId}/views`).set(firebase.database.ServerValue.increment(1));
            history.replaceState(null, '', '#post=' + postId);
            showDetailView(postId);
        }

        function showBoardViewAndClearHash() {
            history.replaceState(null, '', location.pathname);
            showBoardView();
        }

        function showDetailView(postId) {
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;
            if (isBlinded(post)) { showBoardView(); return; }

            const liked = post.likedBy && post.likedBy[userId];

            const commentsHtml = Object.entries(post.comments || {})
                .map(([cid, c]) => `
                    <div class="comment">
                        <div class="comment-meta">
                            ${escapeHtml(c.nickname || '익명')} • ${c.date}
                            ${c.user_id === userId ? `<button class="delete-btn" onclick="deleteComment('${post.id}', '${cid}')">🗑️ 삭제</button>` : ''}
                        </div>
                        <div class="comment-text">${escapeHtml(c.text)}</div>
                    </div>
                `).join('');

            document.getElementById('detail-content').innerHTML = `
                <div class="detail-post">
                    <span class="category-badge">${post.category}</span>${isHot(post) ? '<span class="hot-badge">🔥 HOT</span>' : ''}
                    <button class="delete-btn" style="float: right;" onclick="deletePost('${post.id}')">🗑️ 글 삭제</button>
                    <div class="detail-title">${escapeHtml(post.title)}</div>
                    <div class="post-meta">${escapeHtml(post.nickname || '익명')} • ${post.created_at} • 👁️ ${post.views || 0}</div>
                    ${post.image ? `<img src="${post.image}" style="width: 100%; max-height: 500px; margin: 15px 0; border-radius: 4px;">` : ''}
                    <div class="detail-content">${escapeHtml(post.content)}</div>
                    ${renderVoteBox(post)}
                    <div class="reaction-bar">
                        ${REACTIONS.map(r => {
                            const cnt = reactionCount(post, r.key);
                            const mine = post.reactions && post.reactions[r.key] && post.reactions[r.key][userId];
                            return `<button class="reaction-btn ${mine ? 'reacted' : ''}" onclick="toggleReaction('${post.id}', '${r.key}')">${r.emoji} ${r.label}${cnt > 0 ? ' ' + cnt : ''}</button>`;
                        }).join('')}
                    </div>
                    <div class="detail-actions">
                        <button class="action-btn ${liked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">👍 추천 ${likeCount(post)}</button>
                        <button class="action-btn">💬 ${Object.keys(post.comments || {}).length}</button>
                        <button class="action-btn" onclick="sharePost('${post.id}')">🔗 공유</button>
                        <button class="action-btn report-btn" onclick="reportPost('${post.id}')">🚨 신고</button>
                    </div>
                    <div class="comments-section">
                        <div class="comment-form">
                            <textarea id="comment-text-${post.id}" placeholder="댓글을 작성하세요... (${escapeHtml(nickname)}(으)로 등록됨)"></textarea>
                            <button class="btn btn-submit" onclick="addComment('${post.id}')">댓글 등록</button>
                        </div>
                        <div>${commentsHtml}</div>
                    </div>
                </div>
            `;

            document.getElementById('board-view').style.display = 'none';
            document.getElementById('detail-view').classList.add('active');
        }

        function showBoardView() {
            document.getElementById('board-view').style.display = 'block';
            document.getElementById('detail-view').classList.remove('active');
        }

        // ===== 추천 (1인 1추천 토글) =====
        function toggleLike(postId) {
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;

            const ref = db.ref(`posts/${postId}/likedBy/${userId}`);
            if (post.likedBy && post.likedBy[userId]) {
                ref.remove().then(() => setTimeout(() => showDetailView(postId), 300));
            } else {
                ref.set(true).then(() => setTimeout(() => showDetailView(postId), 300));
            }
        }

        // ===== 신고 (1인 1신고, 3회 누적 시 블라인드) =====
        function reportPost(postId) {
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;

            if (post.reports && post.reports[userId]) {
                alert('이미 신고한 글이에요.');
                return;
            }

            if (!confirm('이 글을 신고할까요?\n(신고 ' + BLIND_THRESHOLD + '회 누적 시 자동 블라인드 처리됩니다)')) return;

            db.ref(`posts/${postId}/reports/${userId}`).set(true).then(() => {
                alert('신고가 접수되었습니다.');
                setTimeout(() => {
                    const p = allPosts.find(x => x.id === postId);
                    if (p && isBlinded(p)) showBoardView();
                }, 300);
            });
        }

        // ===== 댓글 =====
        function addComment(postId) {
            const text = document.getElementById(`comment-text-${postId}`).value.trim();
            if (!text) return;

            const cid = Date.now().toString();
            db.ref(`posts/${postId}/comments/${cid}`).set({
                text,
                user_id: userId,
                nickname: nickname,
                date: new Date().toLocaleDateString('ko-KR')
            }).then(() => setTimeout(() => showDetailView(postId), 300));
        }

        function deleteComment(postId, commentId) {
            if (!confirm('이 댓글을 삭제할까요?')) return;
            db.ref(`posts/${postId}/comments/${commentId}`).remove()
                .then(() => setTimeout(() => showDetailView(postId), 300));
        }

        // ===== 감정 리액션 (1인당 각 리액션 토글) =====
        function toggleReaction(postId, key) {
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;
            const ref = db.ref(`posts/${postId}/reactions/${key}/${userId}`);
            const mine = post.reactions && post.reactions[key] && post.reactions[key][userId];
            (mine ? ref.remove() : ref.set(true)).then(() => setTimeout(() => showDetailView(postId), 300));
        }

        // ===== 밸런스 게임 =====
        function renderVoteBox(post) {
            if (!post.vote) return '';
            const vA = Object.keys(post.vote.votesA || {}).length;
            const vB = Object.keys(post.vote.votesB || {}).length;
            const total = vA + vB;
            const pA = total ? Math.round(vA / total * 100) : 0;
            const pB = total ? 100 - pA : 0;
            const myA = post.vote.votesA && post.vote.votesA[userId];
            const myB = post.vote.votesB && post.vote.votesB[userId];
            return `
                <div class="vote-box">
                    <div style="color: var(--hot); font-weight: bold; margin-bottom: 10px;">⚖️ 밸런스 게임 (총 ${total}표)</div>
                    <div class="vote-option ${myA ? 'voted' : ''}" onclick="castVote('${post.id}', 'A')">
                        <div class="vote-label"><span>${myA ? '✅ ' : ''}${escapeHtml(post.vote.optionA)}</span><span>${pA}% (${vA}표)</span></div>
                        <div class="vote-bar-bg"><div class="vote-bar-fill" style="width: ${pA}%;"></div></div>
                    </div>
                    <div class="vote-option ${myB ? 'voted' : ''}" onclick="castVote('${post.id}', 'B')">
                        <div class="vote-label"><span>${myB ? '✅ ' : ''}${escapeHtml(post.vote.optionB)}</span><span>${pB}% (${vB}표)</span></div>
                        <div class="vote-bar-bg"><div class="vote-bar-fill" style="width: ${pB}%;"></div></div>
                    </div>
                    <div style="color: #777; font-size: 0.8em;">선택지를 눌러 투표하세요 (변경 가능)</div>
                </div>
            `;
        }

        function castVote(postId, side) {
            const updates = {};
            updates[`posts/${postId}/vote/votesA/${userId}`] = side === 'A' ? true : null;
            updates[`posts/${postId}/vote/votesB/${userId}`] = side === 'B' ? true : null;
            db.ref().update(updates).then(() => setTimeout(() => showDetailView(postId), 300));
        }

        // ===== 개별 글 링크 공유 =====
        function sharePost(postId) {
            const url = location.origin + location.pathname + '#post=' + postId;
            navigator.clipboard.writeText(url).then(() => {
                alert('📋 이 글의 링크가 복사됐어요!\n카톡에 붙여넣기 하세요 ㅋㅋ');
            }).catch(() => {
                prompt('이 링크를 복사하세요:', url);
            });
        }

        // ===== 랜덤 괴담 뽑기 =====
        function randomPost() {
            const candidates = allPosts.filter(p => !isBlinded(p));
            if (candidates.length === 0) { alert('아직 글이 없어요!'); return; }
            const pick = candidates[Math.floor(Math.random() * candidates.length)];
            openPost(pick.id);
            window.scrollTo(0, 0);
        }

        // ===== 밸런스 게임 입력창 토글 =====
        function toggleVoteInputs() {
            document.getElementById('vote-inputs').style.display =
                document.getElementById('vote-toggle').checked ? 'block' : 'none';
        }

        // ===== 글 작성 =====
        async function submitPost() {
            const category = document.getElementById('category').value;
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const password = document.getElementById('post-password').value;

            if (!category || !title || !content) {
                alert('카테고리, 제목, 내용을 모두 입력하세요');
                return;
            }

            const postId = Date.now().toString();
            const post = {
                category,
                title,
                content,
                image: selectedImage || null,
                views: 0,
                likedBy: {},
                reports: {},
                created_at: new Date().toLocaleDateString('ko-KR'),
                created_ts: Date.now(),
                user_id: userId,
                nickname: nickname,
                comments: {}
            };

            if (document.getElementById('vote-toggle').checked) {
                const a = document.getElementById('vote-a').value.trim();
                const b = document.getElementById('vote-b').value.trim();
                if (!a || !b) { alert('밸런스 게임 선택지 A, B를 모두 입력하세요!'); return; }
                post.vote = { optionA: a, optionB: b, votesA: {}, votesB: {} };
            }

            if (password) {
                post.password_hash = await hashPassword(password);
            }

            db.ref(`posts/${postId}`).set(post).then(() => {
                closeWriteModal();
                selectedImage = null;
            });
        }

        // ===== 글 삭제 (본인 or 비밀번호) =====
        async function deletePost(postId) {
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;

            // 1. 본인 글이면 바로 삭제
            if (post.user_id === userId) {
                if (!confirm('정말 이 글을 삭제할까요? 되돌릴 수 없어요!')) return;
                db.ref(`posts/${postId}`).remove().then(() => showBoardView());
                return;
            }

            // 2. 비밀번호가 설정된 글이면 비밀번호 확인
            if (post.password_hash) {
                const pw = prompt('글 비밀번호를 입력하세요:');
                if (pw === null) return;
                const hash = await hashPassword(pw);
                if (hash === post.password_hash) {
                    db.ref(`posts/${postId}`).remove().then(() => showBoardView());
                } else {
                    alert('비밀번호가 틀렸어요!');
                }
                return;
            }

            // 3. 둘 다 아니면 삭제 불가
            alert('이 글은 작성자만 삭제할 수 있어요.\n(작성한 브라우저에서 접속하면 삭제 가능)');
        }

        // ===== 모달 =====
        function openWriteModal() {
            document.getElementById('write-modal').classList.add('active');
        }

        function closeWriteModal() {
            document.getElementById('write-modal').classList.remove('active');
            document.getElementById('write-form').reset();
            document.getElementById('image-preview').innerHTML = '';
            document.getElementById('vote-inputs').style.display = 'none';
            selectedImage = null;
        }

        // ===== 통계 =====
        function updateStats() {
            const visible = allPosts.filter(p => !isBlinded(p));
            document.getElementById('total-posts').textContent = visible.length;
            document.getElementById('total-hot').textContent = visible.filter(isHot).length;
            document.getElementById('total-likes').textContent = visible.reduce((s, p) => s + likeCount(p), 0);
            document.getElementById('total-comments').textContent = visible.reduce((s, p) => s + Object.keys(p.comments || {}).length, 0);

            const cats = ['PM', 'CRC', 'PI', 'PH', 'IRB', '기타'];
            const stats = cats.map(c => ({
                name: c === '기타' ? '+@' : c,
                count: visible.filter(p => p.category === c).length
            })).sort((a, b) => b.count - a.count);

            document.getElementById('category-stats').innerHTML = stats.map(s => `
                <div class="stat-item">${s.name}: <span class="stat-value">${s.count}</span></div>
            `).join('');

            // 명예의 전당 TOP 3
            const top3 = [...visible].sort((a, b) => likeCount(b) - likeCount(a)).filter(p => likeCount(p) > 0).slice(0, 3);
            const medals = ['🥇', '🥈', '🥉'];
            document.getElementById('hall-of-fame').innerHTML = top3.length
                ? top3.map((p, i) => `<div class="stat-item" style="cursor: pointer;" onclick="openPost('${p.id}')">${medals[i]} ${escapeHtml(p.title.substring(0, 18))}${p.title.length > 18 ? '…' : ''} <span class="stat-value">👍${likeCount(p)}</span></div>`).join('')
                : '<div class="stat-item">아직 추천받은 글이 없어요</div>';
        }
    </script>
</body>
</html>
